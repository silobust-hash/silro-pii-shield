<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>silro-pii-shield</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
             font-size: 13px; background: #f9fafb; color: #111827; }
      #app { display: flex; flex-direction: column; height: 100vh; }
      header { background: #1e40af; color: white; padding: 12px 16px; }
      header h1 { font-size: 15px; font-weight: 600; }
      header p  { font-size: 11px; opacity: 0.8; margin-top: 2px; }
      section { padding: 12px 16px; border-bottom: 1px solid #e5e7eb; }
      section h2 { font-size: 12px; font-weight: 600; color: #6b7280;
                   text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
      .mapping-row { display: flex; align-items: center; gap: 6px; padding: 4px 0;
                     border-bottom: 1px dashed #f3f4f6; font-size: 12px; }
      .mapping-alias { font-weight: 600; color: #1e40af; min-width: 60px; }
      .mapping-original { color: #374151; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .empty { color: #9ca3af; font-size: 12px; padding: 8px 0; }
      .dict-row { display: flex; align-items: flex-start; gap: 6px; padding: 6px 0;
                  border-bottom: 1px dashed #f3f4f6; }
      .dict-alias { font-weight: 600; color: #059669; min-width: 60px; font-size: 12px; }
      .dict-patterns { font-size: 11px; color: #6b7280; flex: 1; }
      .dict-del { font-size: 11px; color: #ef4444; cursor: pointer;
                  background: none; border: none; padding: 0 4px; }
      .add-form { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
      .add-form input, .add-form select {
        border: 1px solid #d1d5db; border-radius: 4px; padding: 5px 8px;
        font-size: 12px; width: 100%; }
      .add-form button { background: #1e40af; color: white; border: none; border-radius: 4px;
                         padding: 6px 12px; font-size: 12px; cursor: pointer; align-self: flex-end; }
      .toggle-row { display: flex; align-items: center; justify-content: space-between;
                    padding: 6px 0; font-size: 12px; }
      .toggle-switch { position: relative; width: 36px; height: 20px; }
      .toggle-switch input { opacity: 0; width: 0; height: 0; }
      .toggle-slider { position: absolute; inset: 0; background: #d1d5db; border-radius: 10px;
                       cursor: pointer; transition: background 0.2s; }
      .toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px;
                                left: 2px; top: 2px; background: white; border-radius: 50%;
                                transition: transform 0.2s; }
      input:checked + .toggle-slider { background: #1e40af; }
      input:checked + .toggle-slider::before { transform: translateX(16px); }
      #status-bar { padding: 6px 16px; font-size: 11px; color: #6b7280;
                    border-top: 1px solid #e5e7eb; margin-top: auto; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>silro-pii-shield</h1>
        <p id="site-label">로드 중...</p>
      </header>

      <section id="mappings-section">
        <h2>현재 대화 매핑</h2>
        <div id="mappings-list"><p class="empty">매핑 없음</p></div>
      </section>

      <section id="dict-section">
        <h2>사용자 사전 (Layer 2)</h2>
        <div id="dict-list"><p class="empty">등록된 항목 없음</p></div>
        <div class="add-form">
          <select id="dict-category">
            <option value="person">사람</option>
            <option value="company">회사</option>
            <option value="hospital">병원</option>
            <option value="department">부서</option>
            <option value="custom">기타</option>
          </select>
          <input id="dict-patterns" type="text" placeholder="홍길동, 홍 대표 (쉼표 구분)" />
          <input id="dict-alias" type="text" placeholder="가명 (예: A씨, 회사1)" />
          <button id="dict-add-btn">추가</button>
        </div>
      </section>

      <section id="settings-section">
        <h2>사이트별 설정</h2>
        <div id="site-toggles"></div>
      </section>

      <div id="status-bar">v0.2.0 — 로컬 처리, 외부 전송 없음</div>
    </div>
    <script type="module" src="../src/ui/side-panel/side-panel.ts"></script>
  </body>
</html>
